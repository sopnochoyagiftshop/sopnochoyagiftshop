<body>

<header>
<img src="logo.png" class="logo">
</header>

<section class="hero">
<h1>স্বপ্নছোঁয়া - Gift Shop</h1>

<p>উপহারের ছোঁয়ায় ভালোবাসার ভাষা</p>

<a class="btn fb"
href="https://www.facebook.com/sopnochoyagiftshop">
Facebook Page
</a>

<a class="btn whatsapp"
href="https://wa.me/8801344141394">
WhatsApp Order
</a>
</section>

<section style="padding:20px">

<h2 style="text-align:center">
আমাদের জনপ্রিয় কম্বো
</h2>

<div id="products"
style="
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
max-width:1200px;
margin:auto;
">
</div>

</section>

<script>

fetch("products.json")
.then(res=>res.json())
.then(products=>{

const container =
document.getElementById("products");

products.forEach(product=>{

container.innerHTML += `
<div style="
background:white;
padding:15px;
border-radius:12px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
text-align:center;
">

<h3>${product.name}</h3>

<p>কোড: ${product.id}</p>

<p>৳ ${product.price}</p>

<p>${product.stock}</p>

<button style="
padding:10px 20px;
border:none;
border-radius:8px;
cursor:pointer;
background:#25d366;
color:white;
">
বিস্তারিত দেখুন
</button>

</div>
`;

});

});

</script>

</body>
