<!DOCTYPE html>

<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>স্বপ্নছোঁয়া - Gift Shop</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#fffaf7;
}

header{
    background:#fff;
    padding:20px;
    text-align:center;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.logo{
    width:180px;
}

.hero{
    text-align:center;
    padding:40px 20px;
}

.hero h1{
    color:#b13d65;
    margin-bottom:10px;
}

.btn{
    display:inline-block;
    padding:12px 25px;
    margin:10px;
    border-radius:8px;
    text-decoration:none;
    font-weight:bold;
}

.fb{
    background:#1877f2;
    color:white;
}

.whatsapp{
    background:#25d366;
    color:white;
}

.products{
    max-width:1200px;
    margin:auto;
    padding:20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.card{
    background:white;
    padding:15px;
    border-radius:12px;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
    text-align:center;
}

.order-btn{
    display:inline-block;
    padding:10px 20px;
    border-radius:8px;
    background:#25d366;
    color:white;
    text-decoration:none;
}
</style>

</head>

<body>

<header>
    <img src="logo.png" class="logo" alt="Logo">
</header>

<section class="hero">
    <h1>স্বপ্নছোঁয়া - Gift Shop</h1>
    <p>উপহারের ছোঁয়ায় ভালোবাসার ভাষা</p>

```
<a class="btn fb"
href="https://www.facebook.com/sopnochoyagiftshop">
Facebook Page
</a>

<a class="btn whatsapp"
href="https://wa.me/8801344141394">
WhatsApp
</a>
```

</section>

<section class="products">
    <h2 style="text-align:center;">আমাদের জনপ্রিয় কম্বো</h2>

```
<div id="products" class="grid"></div>
```

</section>

<script>
fetch('./products.json')
.then(response => response.json())
.then(products => {

    const container =
    document.getElementById('products');

    products.forEach(product => {

        container.innerHTML += `
        <div class="card">

            <h3>${product.name}</h3>

            <p>কোড: ${product.id}</p>

            <p>৳ ${product.price}</p>

            <p>স্টক: ${product.stock}</p>

            <a class="order-btn"
            href="https://wa.me/8801344141394?text=আমি ${product.name} অর্ডার করতে চাই">
            অর্ডার করুন
            </a>

        </div>
        `;
    });

})
.catch(error => {
    console.log(error);
});
</script>

</body>
</html>
